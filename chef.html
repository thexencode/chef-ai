<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef Assistant 🍳</title>
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="chef.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">👨‍🍳 Chef Assistant</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero-section">
    <video autoplay muted loop id="bg-video">
      <source src="bg.mp4" type="video/mp4"> 
    </video>
    <div class="overlay"></div>

    <div class="hero-content text-center text-white">
      <h1 class="display-4 fw-bold">Chef Assistant 🍳</h1>
      <p class="lead mb-4">Enter your ingredients and discover recipes by nationality</p>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <div class="input-group mb-3">
              <input id="ingredientInput" type="text" class="form-control form-control-lg" placeholder="e.g. chicken, tomato, garlic" />
              <select id="nationality" class="form-select form-select-lg">
                <option value="">Any Cuisine</option>
                <option value="italian">Italian</option>
                <option value="indian">Indian</option>
                <option value="mexican">Mexican</option>
                <option value="chinese">Chinese</option>
                <option value="french">French</option>
              </select>
              <button class="btn btn-primary btn-lg" onclick="findRecipes()">Find Recipes</button>
            </div>
          </div>
        </div>
      </div>

      <div id="recipeResults" class="container mt-5"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">© 2025 Chef Assistant. Created with ❤️ using HTML, CSS, JS & Spoonacular API.</p>
  </footer>

  <script src="chef.css"></script>
</body>
</html>
